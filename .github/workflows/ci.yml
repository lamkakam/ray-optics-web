name: CI
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: changed-files
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - '**/*.py'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: bash scripts/init-python-venv.sh
      - if: steps.changed-files.outputs.python == 'true'
        run: bash scripts/run-python-tests.sh
      - run: bash scripts/build-python-wheel.sh
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /ray-optics-web
